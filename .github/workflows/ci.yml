name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.33.2 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit and integration tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Audit dependencies
        run: pnpm audit

      - name: Install Playwright browser
        run: pnpm --filter @finances/frontend exec playwright install --with-deps chromium

      - name: Mocked browser workflows
        run: pnpm --filter @finances/frontend test:e2e

      - name: Full-stack browser smoke
        run: pnpm --filter @finances/frontend test:e2e:full-stack
